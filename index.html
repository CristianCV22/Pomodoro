<!DOCTYPE html>
<html lang="es-419">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomate | CCamiloVGarcia</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/temporizador.css">
    <link rel="stylesheet" href="css/ritual.css">
    <link rel="stylesheet" href="css/splash.css">
    <link rel="stylesheet" href="css/tareas.css">
    <link rel="stylesheet" href="css/estadisticas.css">
</head>
<body>
    <header id="bienvenida" class="pantallaBienvenida">
        <h1 >Tomate</h1>
        <h2>Temporizador de enfoque</h2>
        <p>by <strong>CCamiloVGarcia</strong></p>
    </header>
    <div id="modal-ritual" class="modal-overlay oculto">
        <div class="modal-contenido">
            <h2 class="titulo-ritual">Ritual de Inicio</h2>
            <p class="subtitulo-ritual">Prepara tu entorno antes de entrar en zona.</p>
            
            <div class="lista-ritual">
                <label class="tarea-ritual">
                    <input type="checkbox" class="checkbox-ritual">
                    <span>Respirar profundo (3 veces)</span>
                </label>
                
                <label class="tarea-ritual">
                    <input type="checkbox" class="checkbox-ritual">
                    <span>Música de estudio lista</span>
                </label>
                
                <label class="tarea-ritual">
                    <input type="checkbox" class="checkbox-ritual">
                    <span>Libreta y lapiceros a la mano</span>
                </label>
                
                <label class="tarea-ritual">
                    <input type="checkbox" class="checkbox-ritual">
                    <span>Pestañas exclusivas para estudiar</span>
                </label>
            </div>

            <button id="btn-entrar-zona" class="boton" disabled>Entrar en Zona</button>
        </div>
    </div>
    <main class="contenedor-principal">
        
        <header class="header-app">
            <h1 class="titulo">Tiempo de Enfoque</h1>
            <button id="btn-abrir-estadisticas" class="boton-header">📊 Stats</button>
        </header>

        <section class="temporizador">
            <p id="tarea-activa-display" class="tarea-activa-texto">Enfoque: Modo Libre</p>
            <time id="tiempo-display">25:00</time>
            <p id="contador-ciclos" class="contador">Pomodoros completados: 0</p>
        </section>

        <section class="controles">
            <button id="btn-iniciar" class="boton">Iniciar</button>
            <button id="btn-pausar" class="boton">Pausar</button>
            <button id="btn-reiniciar" class="boton">Reiniciar</button>
        </section>
        <section class="gestor-tareas">
            <div class="input-contenedor">
                <input type="text" id="input-nueva-tarea" class="input-tarea" placeholder="¿Cuál es tu enfoque de hoy?">
                <button id="btn-agregar-tarea" class="boton boton-agregar">+</button>
            </div>
            
            <ul id="lista-tareas" class="lista-tareas">
                </ul>
        </section>
    </main>
    <div id="modal-estadisticas" class="modal-overlay oculto">
        <div class="modal-contenido modal-largo">
            <header class="modal-header">
                <h2 class="titulo-ritual">Auditoría de Esfuerzo</h2>
                <button id="btn-cerrar-estadisticas" class="btn-cerrar">✖</button>
            </header>
            
            <div class="estadisticas-contenedor">
                <div id="grafico-contenedor" class="grafico-puro">

                </div>
            </div>
        </div>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
